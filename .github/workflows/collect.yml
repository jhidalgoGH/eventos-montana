# Tarea automática: recoger eventos una vez al día.
#
# GitHub la ejecuta solo (cron, hora UTC). Si el recolector encuentra cambios
# en los datos, los guarda con un commit; ese push hace que Vercel vuelva a
# publicar la web con los eventos al día. También se puede lanzar a mano desde
# la pestaña Actions de GitHub ("Run workflow").

name: Recoger eventos

on:
  schedule:
    - cron: "0 5 * * *" # todos los días a las 05:00 UTC (07:00 en España en verano)
  workflow_dispatch: # botón para lanzarla a mano

permissions:
  contents: write # necesario para que la tarea pueda hacer commit de los datos

jobs:
  recoger:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar el recolector
        run: node scripts/collect.mjs

      - name: Guardar los datos si han cambiado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "Actualización automática de eventos"
            git push
          fi
